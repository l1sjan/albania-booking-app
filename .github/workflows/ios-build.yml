name: Build Unsigned iOS App
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64

      - name: Install Dependencies
        run: flutter pub get

      - name: Disable Xcode Code Signing Requirements
        run: sed -i '' 's/PRODUCT_BUNDLE_IDENTIFIER = /CODE_SIGNING_ALLOWED = NO; CODE_SIGNING_REQUIRED = NO; PRODUCT_BUNDLE_IDENTIFIER = /g' ios/Runner.xcodeproj/project.pbxproj

      - name: Build Xcode Frameworks
        run: flutter build ios --no-codesign --release

      - name: Package IPA Structure
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r AlbaniaBookingApp.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AlbaniaBookingApp-iOS
          path: AlbaniaBookingApp.ipa
