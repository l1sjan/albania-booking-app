name: Build Unsigned iOS App

on:
  workflow_dispatch:

jobs:
  build:
    name: Build iOS Production IPA
    runs-on: macos-latest

    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Setup Java Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64
          cache: true
          cache-key: "flutter-:os:-:channel:-:version:-:arch:-:hash:"

      - name: 4. Install Project Dependencies
        run: flutter pub get

      - name: 5. Inject Code Signing Bypass Configurations
        run: |
          echo "CODE_SIGNING_ALLOWED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGNING_REQUIRED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGNING_ALLOWED=NO" >> ios/Flutter/Debug.xcconfig
          echo "CODE_SIGNING_REQUIRED=NO" >> ios/Flutter/Debug.xcconfig

      - name: 6. Compile Xcode Frameworks (No-Codesign)
        run: flutter build ios --no-codesign --release

      - name: 7. Package Application into IPA Structure
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r AlbaniaBookingApp.ipa Payload

      - name: 8. Archive and Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AlbaniaBookingApp-iOS
          path: AlbaniaBookingApp.ipa
          retention-days: 5
